name: Watchdog Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/monitor.yml"

concurrency:
  group: watchdog-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run one watchdog cycle
        env:
          SC_TEAM_ID: ${{ secrets.SC_TEAM_ID }}
          SC_PASSWORD: ${{ secrets.SC_PASSWORD }}
          SC_INSTITUTION: ${{ secrets.SC_INSTITUTION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          EMAIL_ENABLED: "true"
        run: |
          cp config.example.json config.json
          python run.py --once
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchdog-report-${{ github.run_id }}
          path: |
            outputs/*.xlsx
            logs/*.log
          if-no-files-found: ignore
          retention-days: 14
